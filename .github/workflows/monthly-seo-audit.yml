name: Monthly SEO Audit

on:
  schedule:
    - cron: '0 14 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run monthly audit
        run: npm run blog:audit-monthly

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-seo-audit-report
          path: reports/seo-audit/*.md
