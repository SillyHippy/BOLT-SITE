name: Weekly Blog Release

on:
  schedule:
    - cron: '0 15 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-post:
    runs-on: ubuntu-latest
    env:
      BLOG_TARGET_DATE: '2027-02-28'
      BLOG_MAX_RELEASES_PER_RUN: '5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release queued posts (adaptive cadence)
        run: npm run blog:release-weekly

      - name: Regenerate sitemaps, AIO assets, and freshness manifest
        run: |
          node scripts/generate-page-freshness.mjs
          node scripts/answer-engine-optimization.js
          node scripts/generate-sitemap.js && node scripts/generate-video-sitemap.js && node scripts/generate-ai-sitemap.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/blog content/blog-queue lib/page-freshness.generated.json public/blog/images public/sitemap.xml public/video-sitemap.xml public/ai-sitemap.xml public/ai-search public/_redirects content/blog-queue/pending-redirects.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          published_count=$(git diff --cached --name-only | awk '/^app\/blog\/[^/]+\/page\.tsx$/{count++} END{print count+0}')
          git commit -m "chore(blog): publish ${published_count} queued post(s)"
          git push
